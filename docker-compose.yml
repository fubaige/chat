services:
  # 后端服务
  backend:
    build: .
    container_name: fastchat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./llm_backend/.env:/app/.env
      - ./llm_backend/uploads:/app/uploads
      - ./llm_backend/logs:/app/logs
    env_file:
      - ./llm_backend/.env
    restart: always
    depends_on:
      - mysql
      - redis

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: fastchat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE-fastchat}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: always

  # Redis 缓存
  redis:
    image: redis:6.2
    container_name: fastchat-redis
    ports:
      - "6379:6379"
    restart: always

  # Neo4j 图数据库
  neo4j:
    image: neo4j:4.4
    container_name: fastchat-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./data/neo4j/data:/data
    restart: always
